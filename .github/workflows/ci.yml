---
name: CI

on:
  workflow_dispatch:
  push:

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: linux/Dockerfile
          platforms: linux/amd64,linux/arm64/8
          push: false
          tags: gesellix/npipe:ci-linux

  build-windows:
    name: Build (Windows)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Docker Build
        run: |
          docker build -f windows/Dockerfile -t gesellix/npipe:ci-windows .
...
